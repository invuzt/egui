plugins {
    id 'com.android.application'
}

android {
    namespace 'com.odfiz.egui'
    compileSdk 34

    defaultConfig {
        applicationId "com.odfiz.egui"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
