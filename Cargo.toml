[package]
name = "agdk_egui"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Mengaktifkan wgpu untuk rendering dan android-native-activity untuk lifecycle
eframe = { version = "0.27", default-features = false, features = [
    "android-native-activity",
    "wgpu",
    "persistence",
] }
