[package]
name = "odfiz_miniquad"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
miniquad = "0.4"
egui = "0.27"
egui-miniquad = "0.16" # Pakai tanda hubung (-), bukan underscore (_)

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
