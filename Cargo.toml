[package]
name = "agdk_egui"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Naikkan ke 0.30 agar cocok dengan keyboard
eframe = { version = "0.30", features = ["android-native-activity"] }
winit = { version = "0.30", features = ["android-native-activity"] }
egui_virtual_keyboard = "0.1.3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
