[package]
name = "odfiz_miniquad"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
miniquad = "0.4"
# Paksa pakai 0.27 agar sinkron dengan egui-miniquad
egui = "=0.27.2"
egui-miniquad = "=0.16.0"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
