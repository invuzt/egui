[package]
name = "agdk_egui"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
eframe = { version = "0.27.2", features = ["android-native-activity"] }
winit = { version = "0.29", features = ["android-native-activity"] }
# Pake yang resmi ini Mas:
egui_virtual_keyboard = "0.1.3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
