[package]
name = "agdk_egui"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
eframe = { version = "0.27", default-features = false, features = ["android-native-activity", "wgpu", "glow"] }
winit = { version = "0.29", features = ["android-native-activity"] }
egui = "0.27"
egui_cable = "0.5"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "net", "macros"] }
axum = "0.7"
