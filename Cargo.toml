[package]
name = "agdk_egui"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[profile.release]
strip = true
lto = true
panic = "abort"
opt-level = "z"


[dependencies]
eframe = { version = "0.27", default-features = false, features = ["android-native-activity", "wgpu", "glow"] }
# Kita panggil winit secara manual karena eframe menyembunyikannya
winit = { version = "0.29", features = ["android-native-activity"] }
egui = "0.27"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "net", "macros"] }
axum = "0.7"
egui_plot = "0.27"
chrono = "0.4"
