[package]
name = "odfiz_slint"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Kunci versi 1.9.1 agar stabil
slint = { version = "=1.9.1", features = ["compat-1-2", "renderer-software"] }
# Tambahkan jembatan yang hilang tadi
android-activity = { version = "0.6", features = ["game-activity"] }

[build-dependencies]
slint-build = "=1.9.1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
