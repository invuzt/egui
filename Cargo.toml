[package]
name = "odfiz_slint"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
slint = { version = "1.15.1", features = ["compat-1-2", "backend-android-activity-06", "renderer-software"] }
# Tambahkan reqwest dengan fitur blocking untuk sinkronisasi yang mudah
reqwest = { version = "0.11", features = ["blocking"] }

[build-dependencies]
slint-build = "1.15.1"
