[package]
name = "odfiz_slint"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Kita kunci versinya ke 1.9 agar stabil
slint = { version = "1.9.1", features = ["compat-1-2", "renderer-software"] }
# Tambahkan backend ini secara manual sesuai saran error
i-slint-backend-android-activity = "1.9.1"

[build-dependencies]
slint-build = "1.9.1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
